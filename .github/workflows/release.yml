name: Release

# Builds standalone single-file binaries for Linux / macOS / Windows,
# multi-arch Docker images for Alpine / Debian / Ubuntu, Python wheel + sdist,
# and portable "extract-and-run" bundles — then attaches everything to a
# GitHub Release whenever a tag like `v1.9.0` is pushed.
#
# Manual dispatch is also supported for dry-run builds (no release is
# published unless the event is a version tag).

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

# One release run at a time per ref — cancel any stale in-progress runs so a
# partially uploaded artifact from a previous attempt cannot break the new one.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  PYTHON_VERSION: "3.12"

jobs:
  # ---------------------------------------------------------------------------
  # 1. Standalone single-file binaries (PyInstaller)
  # ---------------------------------------------------------------------------
  binaries:
    name: Binary (${{ matrix.os }} / ${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    # Bound the job so an unavailable runner cannot leave the matrix queued
    # forever and cancel the whole release.
    timeout-minutes: 30
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            arch: x86_64
            runner: ubuntu-latest
            ext: ""
          - os: linux
            arch: arm64
            runner: ubuntu-24.04-arm
            ext: ""
          # macOS Intel (x86_64): we no longer schedule a dedicated macos-13
          # runner here — those runners are scarce on free tier and regularly
          # sit queued for hours, blocking the whole release. Intel Macs can
          # still run the arm64 binary via Rosetta 2, and anyone who really
          # needs a native Intel build can run `release/scripts/build_binary.sh`
          # locally (it auto-detects the host arch).
          - os: darwin
            arch: arm64
            runner: macos-14
            ext: ""
          - os: windows
            arch: x86_64
            runner: windows-latest
            ext: ".exe"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install build deps
        run: |
          python -m pip install --upgrade pip wheel pyinstaller
          python -m pip install .

      - name: Build (Linux/macOS)
        if: matrix.os != 'windows'
        run: |
          python -m PyInstaller --onefile --console --clean --noconfirm \
              --name "snispf-${{ matrix.os }}-${{ matrix.arch }}" \
              --collect-all sni_spoofing \
              --add-data "config.json:." \
              run.py

      - name: Build (Windows)
        if: matrix.os == 'windows'
        run: |
          python -m PyInstaller --onefile --console --clean --noconfirm `
              --name "snispf-windows-${{ matrix.arch }}" `
              --collect-all sni_spoofing `
              --add-data "config.json;." `
              run.py

      - name: Smoke test
        shell: bash
        run: |
          ./dist/snispf-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.ext }} --version || true
          ./dist/snispf-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.ext }} --help | head -n 5

      - uses: actions/upload-artifact@v4
        with:
          name: snispf-${{ matrix.os }}-${{ matrix.arch }}
          path: dist/snispf-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.ext }}
          if-no-files-found: error
          retention-days: 7

  # ---------------------------------------------------------------------------
  # 2. Portable bundles: binary + launcher + config in a zip / tar.gz
  # ---------------------------------------------------------------------------
  bundles:
    name: Portable bundle (${{ matrix.os }} / ${{ matrix.arch }})
    needs: binaries
    if: always()
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            arch: x86_64
            ext: ""
            archive: tar.gz
          - os: linux
            arch: arm64
            ext: ""
            archive: tar.gz
          # darwin/x86_64 binary is not built in CI (see note above); if you
          # need a bundle for Intel macOS, build the binary locally with
          # release/scripts/build_binary.sh and assemble by hand.
          - os: darwin
            arch: arm64
            ext: ""
            archive: tar.gz
          - os: windows
            arch: x86_64
            ext: ".exe"
            archive: zip
    steps:
      - uses: actions/checkout@v4

      # If the matching binary job was skipped / cancelled / failed, the
      # artifact will not exist and this step returns an error. We swallow
      # that gracefully so the rest of the matrix still publishes.
      - name: Download binary artifact
        id: dl
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: snispf-${{ matrix.os }}-${{ matrix.arch }}
          path: ./_bin

      - name: Stop if binary is missing
        if: steps.dl.outcome != 'success'
        run: |
          echo "::warning::Binary for ${{ matrix.os }}/${{ matrix.arch }} was not produced; skipping bundle."
          exit 0

      - name: Assemble bundle
        if: steps.dl.outcome == 'success'
        run: |
          set -eu
          NAME="snispf-${{ matrix.os }}-${{ matrix.arch }}"
          DIR="snispf-${{ matrix.os }}-${{ matrix.arch }}"
          mkdir -p "$DIR"
          cp "_bin/${NAME}${{ matrix.ext }}" "$DIR/"
          chmod +x "$DIR/${NAME}${{ matrix.ext }}" || true
          cp config.json README.md LICENSE "$DIR/"
          if [ "${{ matrix.os }}" = "windows" ]; then
            cp release/scripts/snispf.bat release/scripts/snispf.ps1 "$DIR/"
          else
            cp release/scripts/snispf.sh "$DIR/"
            chmod +x "$DIR/snispf.sh"
          fi

      - name: Pack tar.gz
        if: steps.dl.outcome == 'success' && matrix.archive == 'tar.gz'
        run: tar -czf "snispf-${{ matrix.os }}-${{ matrix.arch }}.tar.gz" "snispf-${{ matrix.os }}-${{ matrix.arch }}"

      - name: Pack zip
        if: steps.dl.outcome == 'success' && matrix.archive == 'zip'
        run: zip -r "snispf-${{ matrix.os }}-${{ matrix.arch }}.zip" "snispf-${{ matrix.os }}-${{ matrix.arch }}"

      - name: Upload bundle
        if: steps.dl.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: bundle-${{ matrix.os }}-${{ matrix.arch }}
          path: snispf-${{ matrix.os }}-${{ matrix.arch }}.${{ matrix.archive }}
          if-no-files-found: error
          retention-days: 7

  # ---------------------------------------------------------------------------
  # 3. Python wheel + sdist (for PyPI / pipx users)
  # ---------------------------------------------------------------------------
  python-dist:
    name: Python wheel & sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: python -m pip install --upgrade pip build
      - run: python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/*
          if-no-files-found: error
          retention-days: 7

  # ---------------------------------------------------------------------------
  # 4. Docker images: build, push to GHCR, and export as a loadable .tar.gz
  # ---------------------------------------------------------------------------
  docker:
    name: Docker (${{ matrix.flavor }})
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - flavor: alpine
            file: release/docker/Dockerfile.alpine
          - flavor: debian
            file: release/docker/Dockerfile.debian
          - flavor: ubuntu
            file: release/docker/Dockerfile.ubuntu

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: meta
        run: |
          OWNER_LC="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          REF="${GITHUB_REF_NAME}"
          IMG="ghcr.io/${OWNER_LC}/snispf"
          if [ "${{ matrix.flavor }}" = "debian" ]; then
            TAGS="${IMG}:${REF},${IMG}:latest,${IMG}:${{ matrix.flavor }},${IMG}:${REF}-${{ matrix.flavor }}"
          else
            TAGS="${IMG}:${{ matrix.flavor }},${IMG}:${REF}-${{ matrix.flavor }}"
          fi
          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"
          echo "image=$IMG" >> "$GITHUB_OUTPUT"

      - name: Build & push (multi-arch)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.file }}
          platforms: linux/amd64,linux/arm64
          push: ${{ startsWith(github.ref, 'refs/tags/v') }}
          tags: ${{ steps.meta.outputs.tags }}
          # Disable the provenance / sbom side-artifacts — they get uploaded
          # as opaque `.dockerbuild` blobs to Actions artifact storage and
          # break a later `download-artifact` that uses no filter.
          provenance: false
          sbom: false

      - name: Build local single-arch image for export
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.file }}
          platforms: linux/amd64
          push: false
          load: true
          tags: snispf:${{ matrix.flavor }}
          provenance: false
          sbom: false

      - name: Export image as loadable archive
        run: |
          docker save snispf:${{ matrix.flavor }} | gzip > "snispf-${{ matrix.flavor }}.tar.gz"
          ls -lh "snispf-${{ matrix.flavor }}.tar.gz"

      - uses: actions/upload-artifact@v4
        with:
          name: docker-${{ matrix.flavor }}
          path: snispf-${{ matrix.flavor }}.tar.gz
          if-no-files-found: error
          retention-days: 7

  # ---------------------------------------------------------------------------
  # 5. Publish a GitHub Release with every artifact
  # ---------------------------------------------------------------------------
  publish:
    name: Publish GitHub Release
    needs: [binaries, bundles, python-dist, docker]
    # Run as long as this is a version tag, even if one of the matrix jobs
    # above failed / was cancelled (e.g. scarce macos-13 runner). We publish
    # whatever artifacts we successfully produced.
    if: always() && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Download ONLY the artifacts we explicitly produced — any external
      # `.dockerbuild` provenance blobs that might have leaked in are
      # filtered out by the name patterns below.
      - name: Download binary artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./_artifacts/binaries
          pattern: "snispf-*"
          merge-multiple: true

      - name: Download bundle artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./_artifacts/bundles
          pattern: "bundle-*"
          merge-multiple: true

      - name: Download docker artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./_artifacts/docker
          pattern: "docker-*"
          merge-multiple: true

      - name: Download python-dist artifact
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: python-dist
          path: ./_artifacts/python

      - name: Flatten artifacts
        run: |
          mkdir -p release_files
          find ./_artifacts -type f -exec cp {} release_files/ \;
          echo "--- release_files ---"
          ls -lh release_files/ || true

      - name: Generate checksums
        run: |
          cd release_files
          sha256sum * > SHA256SUMS.txt
          echo "--- SHA256SUMS.txt ---"
          cat SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release_files/*
          generate_release_notes: true
          fail_on_unmatched_files: false
          body: |
            ## SNISPF ${{ github.ref_name }}

            Pre-built artifacts for every supported platform are attached below.
            Pick whichever is easiest for you — see `release/README.md` in the
            repo for full instructions.

            **Standalone binaries** (no Python needed — just download and run)
            - `snispf-linux-x86_64`, `snispf-linux-arm64`
            - `snispf-darwin-arm64` (Apple Silicon; Intel Macs can run it
              under Rosetta 2 or build natively via `release/scripts/build_binary.sh`)
            - `snispf-windows-x86_64.exe`

            **Portable bundles** (binary + launcher + default config in one archive)
            - `snispf-linux-*.tar.gz`, `snispf-darwin-arm64.tar.gz`, `snispf-windows-x86_64.zip`

            **Docker images** (zero install — just `docker load` and run)
            - `snispf-alpine.tar.gz`  (~60 MB, smallest, musl)
            - `snispf-debian.tar.gz`  (best compatibility, glibc)
            - `snispf-ubuntu.tar.gz`  (familiar Ubuntu environment)

            Also published to GHCR:
            - `ghcr.io/rainman69/snispf:latest`  (debian, multi-arch)
            - `ghcr.io/rainman69/snispf:alpine`, `:debian`, `:ubuntu`

            **Python packages** (pip / pipx)
            - `snispf-*.whl`, `snispf-*.tar.gz`

            All checksums are in `SHA256SUMS.txt`.
